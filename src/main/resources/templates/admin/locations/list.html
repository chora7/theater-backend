<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Locations')}"></head>
<body>
    <nav th:replace="~{layout/fragments :: navbar}"></nav>

    <main>
        <h1>Locations</h1>

        <table>
            <thead>
                <tr>
                    <th>Country</th>
                    <th>City</th>
                    <th>Address</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="loc : ${locations}">
                    <td th:text="${loc.country}"></td>
                    <td th:text="${loc.city}"></td>
                    <td th:text="${loc.address}"></td>
                    <td th:text="${loc.description}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(locations)}">
                    <td colspan="4">No locations found.</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
