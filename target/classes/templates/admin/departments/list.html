<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Departments')}"></head>
<body>
    <nav th:replace="~{layout/fragments :: navbar}"></nav>

    <main>
        <h1>Departments</h1>

        <p th:if="${param.created}" class="alert alert-success"</p>
        <p th:if="${param.updated}" class="alert alert-success">Department updated successfully.</p>
        <p th:if="${param.deleted}" class="alert alert-success">Department deleted successfully.</p>
        <p th:if="${param.assigned}" class="alert alert-success">User assigned successfully.</p>

        <a th:href="@{/admin/departments/new}">+ Add New Department</a>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Assigned Users</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dept : ${departments}">
                    <td th:text="${dept.name}"></td>
                    <td th:text="${dept.category}"></td>
                    <td>
                        <span th:each="u, iter : ${dept.assignedUsers}">
                            <span th:text="${u.username}"></span><span th:if="${!iter.last}">, </span>
                        </span>
                        <span th:if="${#lists.isEmpty(dept.assignedUsers)}">None</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/departments/{id}/edit(id=${dept.id})}">Edit</a>

                        <form th:action="@{/admin/departments/{id}/delete(id=${dept.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Delete this department?');">
                            <button type="submit">Delete</button>
                        </form>

                        <form th:action="@{/admin/departments/{id}/assign(id=${dept.id})}"
                              method="post" style="display:inline;">
                            <select name="userId" required>
                                <option value="" disabled selected>Assign user...</option>
                                <option th:each="u : ${allUsers}"
                                        th:value="${u.id}"
                                        th:text="${u.username}"></option>
                            </select>
                            <button type="submit">Assign</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(departments)}">
                    <td colspan="4">No departments found.</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{layout/fragments :: footer}"></footer>
</body>
</html>
