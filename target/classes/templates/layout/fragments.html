<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8" />
    <title th:text="${pageTitle}">Theater App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<nav th:fragment="navbar">
    <ul>
        <li><a th:href="@{/}">Home</a></li>

        <li th:if="${isAdmin}">
            <a th:href="@{/admin/dashboard}">Admin Dashboard</a>
        </li>
        <li th:unless="${isAdmin}">
            <a th:href="@{/user/dashboard}">My Dashboard</a>
        </li>

        <li th:if="${isAdmin}">
            <a th:href="@{/admin/projects/list}">Projects</a>
        </li>
        <li th:if="${isAdmin}">
            <a th:href="@{/admin/departments/list}">Departments</a>
        </li>
        <li th:if="${isAdmin}">
            <a th:href="@{/admin/performances/list}">Performances</a>
        </li>

        <li th:unless="${isAdmin}">
            <a th:href="@{/user/projects}">My Projects</a>
        </li>
        <li th:unless="${isAdmin}">
            <a th:href="@{/user/performances}">My Performances</a>
        </li>

        <li><a th:href="@{/logout}">Logout</a></li>
    </ul>
</nav>
<footer th:fragment="footer">
    <p>&copy; 2026 Theater App</p>
</footer>

</body>
</html>
